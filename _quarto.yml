  sidebar:
    style: docked
    collapse-level: 1
    contents:
      - text: "Home"
        href: index.qmd
      - text: "Attack Device Specification"
        href: pages/attack-device.qmd
      - section: "WARA Defense"
        contents:
          - text: "Wavelet-based Recovery Design"
            href: pages/wavelet-partition.qmd
          - text: "Detector Parameter Selection"
            href: pages/detector-parameters.qmd
      - section: "Evaluation Results"
        contents:
          - text: "Recovery Effectiveness"
            href: pages/recovery-effectiveness.qmd
          - text: "Advanced Attack Waveforms"
            href: pages/advanced-attack.qmd
          - text: "Impact of External Disturbance"
            href: pages/external-disturbance.qmd
  page-footer:
    left: "© 2026 Yunbo Wang, Cong Sun, Qiaosen Liu. Xidian University."
